# experiment.yaml - Shared experiment configuration
# All three model arms use identical hyperparams for fair comparison

experiment:
  name: "hybrid-doc-extractor"
  seed: [42, 123, 456]
  device: "cuda"

data:
  datasets: ["wildreceipt", "sroie", "cord"]
  total_documents: 3684
  max_seq_len: 512
  train_split: 0.80
  val_split: 0.10
  test_split: 0.10

tokenizer:
  type: "bpe"
  vocab_size: 8000
  min_frequency: 2
  special_tokens: ["[PAD]", "[UNK]", "[CLS]", "[SEP]", "[MASK]"]
  path: "tokenizer_training/tokenizer.json"

labels:
  - "O"
  - "B-DATE"
  - "I-DATE"
  - "B-AMOUNT"
  - "I-AMOUNT"
  - "B-NAME"
  - "I-NAME"

model:
  d_model: 256
  n_layers: 6
  n_heads: 8
  d_ff: 1024
  dropout: 0.2            # increased from 0.1 to reduce overfitting
  max_len: 512

  mamba:
    d_state: 16
    d_conv: 4
    expand: 2

  arms:
    transformer:
      attn_layers: 6
      mamba_layers: 0
    mamba:
      attn_layers: 0
      mamba_layers: 6
    hybrid_5_1:
      attn_layers: 1
      mamba_layers: 5
    hybrid_4_2:
      attn_layers: 2
      mamba_layers: 4
    hybrid_3_3:
      attn_layers: 3
      mamba_layers: 3
    hybrid_2_4:
      attn_layers: 4
      mamba_layers: 2

  # ablation_ratios now defined as full arm configs above

training:
  optimizer: "adamw"
  lr: 1.0e-4                    # reduced from 3e-4 for slower, steadier learning
  weight_decay: 0.01
  scheduler: "onecycle"
  epochs: 50                    # increased from 20 (early stopping will cut short)
  batch_size: 16
  grad_clip: 1.0
  early_stopping_patience: 7   # stop if val F1 doesn't improve for 7 epochs

evaluation:
  metrics: ["entity_f1", "per_field_f1", "throughput_docs_per_sec", "peak_gpu_mb"]
  sequence_length_ablation: [256, 512, 1024]
